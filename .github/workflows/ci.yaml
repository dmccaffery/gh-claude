# Continuous integration — thin caller for the org's reusable ci workflow. It runs
# the canonical Makefile gates (lint, build, test) as one parallel job each, then a
# Codecov upload from coverage/cobertura-coverage.xml (coverage) and
# coverage/junit.xml (test results) — both emitted by `make test`. `make lint`
# carries all check-mode static analysis — addlicense, golangci-lint, govulncheck,
# markdownlint, prettier --check. The Go version comes from go.mod and the Node
# version from package.json.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Continuous Integration

on:
    push:
        branches: [main]
    pull_request:

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
    contents: read

jobs:
    ci:
        # The default cache-dependency-path (go.sum) is the only lockfile that
        # affects the build: the dev CLIs (golangci-lint, govulncheck, addlicense,
        # gotestsum, gocover-cobertura) are pinned by the make/ submodule's
        # .<tool>-version files, not a tools/go.sum.
        uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@176732b8b8ef2598ae0593db728b4415bcc86888 # v4.4.0
