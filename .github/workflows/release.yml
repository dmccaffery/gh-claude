name: release

# Publishes precompiled binaries for the gh extension whenever a vX.Y.Z tag is
# pushed, so `gh extension install bitwise-media-group/gh-claude` works on macOS,
# Linux and WSL2 (and Windows) without a local Go toolchain.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cli/gh-extension-precompile@v2
        with:
          go_version_file: go.mod
